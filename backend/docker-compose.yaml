# version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: bytebharat-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: qwerty
    networks:
      - bytebharat-network
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: bytebharat-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: qwerty
      ME_CONFIG_MONGODB_URL: mongodb://admin:qwerty@mongo:27017/
    networks:
      - bytebharat-network
    depends_on:
      - mongo

  backend:
    build: .
    container_name: bytebharat-backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://admin:qwerty@mongo:27017/bytebharat?authSource=admin
      - JWT_SECRET=cb014429dafb2f61a6bb965187aa6cb2d29c2be7c1959f7232ee34b3d15ea44e
      - REFRESH_TOKEN_SECRET=8a252945fba9a6f18b790b6224621374342f3bc1cc3cda1ac20915c0d6875c5a
    networks:
      - bytebharat-network
    depends_on:
      - mongo

networks:
  bytebharat-network:
    external: true

volumes:
  mongo-data:
